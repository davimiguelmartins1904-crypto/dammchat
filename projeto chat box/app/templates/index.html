<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGroup</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #14171f;
      --surface2:  #1c2030;
      --border:    #252a3a;
      --accent:    #5b8af0;
      --accent2:   #9b6dff;
      --green:     #3ecf8e;
      --red:       #ff5c6a;
      --text:      #e8ecf4;
      --muted:     #6b7591;
      --own-bg:    #1e2d52;
      --own-border:#3a5abf;
      --radius:    14px;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: .6;
    }

    /* ── LAYOUT ── */
    #app { position: relative; z-index: 1; display: flex; height: 100vh; }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 240px; min-width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 0;
    }

    .sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 18px; font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent2); }
    .subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: .5px; text-transform: uppercase; }

    .section-title {
      padding: 16px 20px 8px;
      font-size: 10px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
    }

    #user-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
    #user-list::-webkit-scrollbar { width: 4px; }
    #user-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .user-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 10px;
      margin-bottom: 2px; transition: background .15s;
      font-size: 14px;
    }
    .user-item:hover { background: var(--surface2); }
    .user-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
    }
    .user-name { color: var(--text); flex: 1; }
    .user-name.is-me { color: var(--accent); font-weight: 600; }

    .online-count {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      font-size: 12px; color: var(--muted);
    }
    .online-count strong { color: var(--green); }

    /* ── MAIN CHAT ── */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    #chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .chat-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .chat-title { font-weight: 600; font-size: 15px; }
    .chat-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }

    #conn-status {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .3s; }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.error { background: var(--red); }

    /* ── MESSAGES ── */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 20px 24px;
      display: flex; flex-direction: column; gap: 2px;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-group {
      display: flex; flex-direction: column;
      margin-bottom: 12px; animation: fadeUp .25s ease;
    }
    .msg-group.own { align-items: flex-end; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-meta {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 4px; padding: 0 4px;
    }
    .msg-group.own .msg-meta { flex-direction: row-reverse; }
    .msg-author {
      font-size: 12px; font-weight: 600;
      color: var(--accent2);
    }
    .msg-group.own .msg-author { color: var(--accent); }
    .msg-time { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }

    .bubble {
      max-width: 65%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px; line-height: 1.55;
      background: var(--surface2);
      border: 1px solid var(--border);
      word-break: break-word;
    }
    .msg-group.own .bubble {
      background: var(--own-bg);
      border-color: var(--own-border);
    }

    /* system messages */
    .sys-msg {
      text-align: center;
      font-size: 12px; color: var(--muted);
      padding: 6px 0;
      font-style: italic;
      animation: fadeUp .2s ease;
    }

    /* typing indicator */
    #typing-bar {
      min-height: 24px; padding: 0 24px 6px;
      font-size: 12px; color: var(--accent);
      font-style: italic; transition: opacity .2s;
    }

    /* ── INPUT ── */
    #input-area {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
    }
    #msg-input {
      flex: 1;
      background: var(--surface2); color: var(--text);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 11px 16px;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      resize: none; max-height: 120px; outline: none;
      transition: border-color .2s;
      line-height: 1.5;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 46px; height: 46px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: var(--radius);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform .15s, opacity .15s;
      color: #fff; font-size: 18px;
    }
    #send-btn:hover { transform: scale(1.06); }
    #send-btn:active { transform: scale(.97); opacity: .85; }
    #send-btn:disabled { opacity: .35; cursor: default; transform: none; }

    /* ── LOGIN SCREEN ── */
    #login-screen {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: 0 30px 80px rgba(0,0,0,.5);
      text-align: center;
    }
    .login-logo {
      font-family: 'Space Mono', monospace;
      font-size: 28px; font-weight: 700;
      color: var(--accent); margin-bottom: 4px;
    }
    .login-logo span { color: var(--accent2); }
    .login-desc { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    .login-label { display: block; text-align: left; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    #username-input {
      width: 100%; padding: 13px 16px;
      background: var(--surface2); color: var(--text);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: 15px; font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color .2s; margin-bottom: 16px;
    }
    #username-input:focus { border-color: var(--accent); }
    #join-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: var(--radius);
      font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: opacity .2s, transform .15s;
    }
    #join-btn:hover { opacity: .92; transform: translateY(-1px); }
    #join-btn:active { transform: translateY(0); }
    #login-error { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 18px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      #sidebar { display: none; }
      .bubble { max-width: 85%; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Chat<span>Group</span></div>
    <div class="login-desc">Entre com um apelido para começar a conversar</div>
    <label class="login-label" for="username-input">Seu apelido</label>
    <input id="username-input" type="text" placeholder="Ex: João, Maria..." maxlength="20" autocomplete="off" />
    <button id="join-btn">Entrar no Chat →</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">Chat<span>Group</span></div>
      <div class="subtitle">Sala pública</div>
    </div>
    <div class="section-title">Online agora</div>
    <div id="user-list"></div>
    <div class="online-count">
      <strong id="online-num">0</strong> pessoa(s) online
    </div>
  </aside>

  <!-- Chat -->
  <div id="main">
    <div id="chat-header">
      <div class="chat-icon">💬</div>
      <div>
        <div class="chat-title">Sala Geral</div>
        <div class="chat-meta">Todos podem ver as mensagens</div>
      </div>
      <div id="conn-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">conectando...</span>
      </div>
    </div>

    <div id="messages"></div>
    <div id="typing-bar"></div>

    <div id="input-area">
      <div class="input-row">
        <textarea id="msg-input" rows="1" placeholder="Digite sua mensagem..." disabled></textarea>
        <button id="send-btn" disabled>➤</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── STATE ──
  const clientId = crypto.randomUUID();
  let myUsername = null;
  let eventSource = null;
  let typingTimeout = null;
  let isTyping = false;
  let typingUsers = {};

  // ── ELEMENTS ──
  const loginScreen   = document.getElementById('login-screen');
  const usernameInput = document.getElementById('username-input');
  const joinBtn       = document.getElementById('join-btn');
  const loginError    = document.getElementById('login-error');
  const messagesDiv   = document.getElementById('messages');
  const msgInput      = document.getElementById('msg-input');
  const sendBtn       = document.getElementById('send-btn');
  const userList      = document.getElementById('user-list');
  const onlineNum     = document.getElementById('online-num');
  const statusDot     = document.getElementById('status-dot');
  const statusText    = document.getElementById('status-text');
  const typingBar     = document.getElementById('typing-bar');

  // ── SSE CONNECTION ──
  function connect() {
    eventSource = new EventSource(`/stream?client_id=${clientId}`);

    eventSource.onopen = () => {
      statusDot.className = 'status-dot connected';
      statusText.textContent = 'conectado';
    };

    eventSource.onerror = () => {
      statusDot.className = 'status-dot error';
      statusText.textContent = 'reconectando...';
    };

    eventSource.onmessage = (e) => {
      const data = JSON.parse(e.data);
      handleEvent(data);
    };
  }

  function handleEvent(data) {
    if (data.type === 'connected') {
      statusDot.className = 'status-dot connected';
      statusText.textContent = 'conectado';
    }
    else if (data.type === 'history') {
      renderMessage(data.message, true);
    }
    else if (data.type === 'new_message') {
      renderMessage(data.message, false);
      scrollToBottom();
    }
    else if (data.type === 'system_message') {
      renderMessage(data.message, false);
      updateUserList(data.online_users);
      scrollToBottom();
    }
    else if (data.type === 'user_left') {
      updateUserList(data.online_users);
    }
    else if (data.type === 'typing') {
      handleTypingEvent(data);
    }
  }

  // ── RENDER ──
  function renderMessage(msg, isHistory) {
    if (msg.type === 'system') {
      const el = document.createElement('div');
      el.className = 'sys-msg';
      el.textContent = msg.text;
      messagesDiv.appendChild(el);
      if (isHistory) scrollToBottom();
      return;
    }

    const isOwn = msg.client_id === clientId;
    const group = document.createElement('div');
    group.className = 'msg-group' + (isOwn ? ' own' : '');

    const meta = document.createElement('div');
    meta.className = 'msg-meta';

    const author = document.createElement('span');
    author.className = 'msg-author';
    author.textContent = isOwn ? 'Você' : msg.username;

    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = msg.timestamp;

    meta.appendChild(author);
    meta.appendChild(time);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = msg.text;

    group.appendChild(meta);
    group.appendChild(bubble);
    messagesDiv.appendChild(group);
  }

  function updateUserList(users) {
    onlineNum.textContent = users.length;
    userList.innerHTML = '';
    users.forEach(name => {
      const item = document.createElement('div');
      item.className = 'user-item';
      const dot = document.createElement('div');
      dot.className = 'user-dot';
      const nameEl = document.createElement('span');
      nameEl.className = 'user-name' + (name === myUsername ? ' is-me' : '');
      nameEl.textContent = name + (name === myUsername ? ' (você)' : '');
      item.appendChild(dot);
      item.appendChild(nameEl);
      userList.appendChild(item);
    });
  }

  function handleTypingEvent(data) {
    if (data.client_id === clientId) return;
    if (data.typing) {
      typingUsers[data.username] = true;
    } else {
      delete typingUsers[data.username];
    }
    const names = Object.keys(typingUsers);
    if (names.length === 0) {
      typingBar.textContent = '';
    } else if (names.length === 1) {
      typingBar.textContent = `${names[0]} está digitando...`;
    } else {
      typingBar.textContent = `${names.join(', ')} estão digitando...`;
    }
  }

  function scrollToBottom() {
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // ── JOIN ──
  async function joinChat() {
    const username = usernameInput.value.trim();
    if (!username) { loginError.textContent = 'Digite um apelido!'; return; }

    joinBtn.disabled = true;
    joinBtn.textContent = 'Entrando...';

    try {
      const res = await fetch('/join', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ client_id: clientId, username })
      });
      const data = await res.json();

      if (!res.ok) {
        loginError.textContent = data.error || 'Erro ao entrar';
        joinBtn.disabled = false;
        joinBtn.textContent = 'Entrar no Chat →';
        return;
      }

      myUsername = data.username;
      loginScreen.style.display = 'none';
      msgInput.disabled = false;
      sendBtn.disabled = false;
      msgInput.focus();
      scrollToBottom();
    } catch (err) {
      loginError.textContent = 'Erro de conexão';
      joinBtn.disabled = false;
      joinBtn.textContent = 'Entrar no Chat →';
    }
  }

  // ── SEND ──
  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;

    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;

    // Para o typing
    if (isTyping) {
      isTyping = false;
      fetch('/typing', { method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ client_id: clientId, typing: false }) });
    }

    try {
      await fetch('/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ client_id: clientId, text })
      });
    } catch (e) {}

    sendBtn.disabled = false;
    msgInput.focus();
  }

  // ── TYPING ──
  function handleTypingInput() {
    // Auto-resize textarea
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';

    if (!isTyping) {
      isTyping = true;
      fetch('/typing', { method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ client_id: clientId, typing: true }) });
    }
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      isTyping = false;
      fetch('/typing', { method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ client_id: clientId, typing: false }) });
    }, 2000);
  }

  // ── EVENTS ──
  joinBtn.addEventListener('click', joinChat);
  usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  msgInput.addEventListener('input', handleTypingInput);

  // Avisa servidor ao fechar aba
  window.addEventListener('beforeunload', () => {
    navigator.sendBeacon('/leave', JSON.stringify({ client_id: clientId }));
  });

  // ── INIT ──
  connect();
</script>
</body>
</html>
